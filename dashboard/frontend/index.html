<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PITS Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-theme">
    <header>
        <div class="logo">PITS <span>Intelligence</span></div>
        <div class="system-status">
            <span class="status-dot green"></span> <span id="conn-status">Checking MT5...</span>
        </div>
    </header>

    <main>
        <section class="active-assets-bar">
            <strong>Monitoring:</strong> <span id="assets-list">No data...</span>
        </section>

        <section class="tables-grid">
            <div class="card table-box">
                <h3>Live Market Monitor</h3>
                <table id="live-table">
                    <thead>
                        <tr>
                            <th>Symbol</th>
                            <th>Price</th>
                            <th>Prob (UP)</th>
                            <th>Entropy</th>
                            <th>Regime</th>
                            <th>Session</th>
                            <th>Total (Disk)</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
        <section class="metrics-grid">
            <div class="card metric">
                <h3>Win Rate</h3>
                <p id="win-rate">0.0%</p>
            </div>
            <div class="card metric">
                <h3>Sharpe Ratio</h3>
                <p id="sharpe">0.00</p>
            </div>
            <div class="card metric">
                <h3>Total Profit</h3>
                <p id="total-profit" class="profit">$0.00</p>
            </div>
            <div class="card metric">
                <h3>Total Trades</h3>
                <p id="total-trades">0</p>
            </div>
        </section>

        <section class="charts-container">
            <div class="card chart-box">
                <h3>Equity Curve</h3>
                <canvas id="equityChart"></canvas>
            </div>
        </section>

        <section class="tables-grid">
            <div class="card table-box">
                <h3>Recent Paper Trades</h3>
                <table id="trades-table">
                    <thead>
                        <tr>
                            <th>Symbol</th>
                            <th>Side</th>
                            <th>Entry</th>
                            <th>Exit</th>
                            <th>PnL</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="dashboard.js"></script>
</body>
</html>
